<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediVise Pro | Researcher Hub (Full Analytics)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary-blue: #00f2fe;
            --accent-purple: #8b5cf6;
            --bg-dark: #0f172a;
            --glass-card: rgba(15, 23, 42, 0.85);
        }

        body {
            /* Set research.png as background */
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)),url('../assets/research-bg.png') no-repeat center center fixed;
            background-size: cover;
            background-color: var(--bg-dark); /* Fallback */
            color: #f1f5f9;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            overflow: hidden; /* Prevent double scrollbars */
        }

        /* Standardize Glassmorphism effect across the page */
        .glass-panel {
            background: var(--glass-card);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(15px) brightness(0.6);
            border-radius: 16px;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 2.5rem 1.5rem;
            z-index: 100;
        }

        .nav-link-custom {
            padding: 12px 20px;
            margin-bottom: 8px;
            border-radius: 10px;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
        }

        .nav-link-custom:hover { background: rgba(255,255,255,0.05); color: white; }
        
        .nav-link-custom.active {
            background: linear-gradient(90deg, rgba(0, 242, 254, 0.1), transparent);
            color: var(--primary-blue);
            border-left: 4px solid var(--primary-blue);
            font-weight: 600;
        }

        /* Main Content Layout */
        .main-content {
            margin-left: 280px;
            height: 100vh;
            overflow-y: auto;
            padding: 3rem 4rem;
        }

        /* Enhanced Card Design */
        .analytics-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.5rem;
            height: 100%;
            transition: 0.3s ease;
        }

        .analytics-card:hover { border-color: rgba(0, 242, 254, 0.3); }

        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: white; }
        
        /* Table Customization */
        .table-custom { color: #e2e8f0; font-size: 0.9rem; }
        .table-custom thead { background: rgba(0,0,0,0.3); }
        .badge-risk-high { background-color: #ef4444; }
        .badge-risk-med { background-color: #f59e0b; color: #000; }

        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Chart Component (UNCHANGED) ---
        const VisualChart = ({ id, type, data, options }) => {
            useEffect(() => {
                if (!data) return;

                const ctx = document.getElementById(id).getContext('2d');
                const newChart = new Chart(ctx, {
                    type,
                    data,
                    options: { ...options, maintainAspectRatio: false }
                });

                return () => newChart.destroy();
            }, [id, data]);

            return <canvas id={id}></canvas>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [signedIn, setSignedIn] = useState(true);

            // NEW STATE
            const [stats, setStats] = useState({});
            const [trendData, setTrendData] = useState(null);
            const [riskData, setRiskData] = useState(null);

            const handleSignout = () => {
                fetch("http://localhost:5000/go/logout", {
                    credentials: "include"
                })
                .then(() => {
                    window.location.href = "/index.html";
                })
                .catch(err => console.error(err));
            };

            // BACKEND INTEGRATION
            useEffect(() => {

                // INTERACTIONS DATA
                fetch("http://localhost:5000/go/researcher/interactions", {
                    credentials: "include"
                })
                .then(res => res.json())
                .then(data => setStats(data))
                .catch(err => console.error(err));

                // RISK DISTRIBUTION
                fetch("http://localhost:5000/go/researcher/risk", {
                    credentials: "include"
                })
                .then(res => res.json())
                .then(data => {
                    setRiskData({
                        labels: ['High Risk', 'Moderate', 'Safe'],
                        datasets: [{
                            data: [data.highRisk, data.mediumRisk, data.lowRisk],
                            backgroundColor: ['#ef4444', '#f59e0b', '#10b981']
                        }]
                    });
                });

                // VISUALIZATION
                fetch("http://localhost:5000/go/researcher/visualization", {
                    credentials: "include"
                })
                .then(res => res.json())
                .then(data => {
                    setTrendData({
                        labels: data.labels,
                        datasets: [{
                            label: 'Prescriptions',
                            data: data.data,
                            backgroundColor: 'rgba(0, 242, 254, 0.6)'
                        }]
                    });
                });

            }, []);

            return (
                <div className="d-flex">

                    {/* SIDEBAR (UNCHANGED) */}
                    <div className="sidebar glass-panel">
                        <h4 className="fw-bold mb-5 px-3" style={{color: 'var(--primary-blue)'}}>MEDIVISE PRO</h4>
                        
                        {['Dashboard', 'Patient Risk', 'Drug Database', 'Lab Trends', 'System Load', 'Sign Out'].map(tab => (
                            <div key={tab} 
                                className={`nav-link-custom ${activeTab === tab ? 'active' : ''}`}
                                onClick={() => {
                                    if (tab === 'Sign Out') {
                                        handleSignout();
                                    } else {
                                        setActiveTab(tab);
                                    }
                                }}>
                                {tab}
                            </div>
                        ))}
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="main-content flex-grow-1">
                        
                        {/* HEADER */}
                        <div className="d-flex justify-content-between align-items-center mb-5 p-3 glass-panel">
                            <div>
                                <h2 className="fw-bold m-0">{activeTab} Analytics</h2>
                                <p className="text-secondary small m-0">Live Research Intelligence Feed</p>
                            </div>
                            <div className="d-flex gap-3">
                                <button 
                                    className="btn btn-sm btn-outline-light"
                                    onClick={() => window.open("http://localhost:5000/go/researcher/export")}
                                >
                                    Export PDF
                                </button>
                                <button className="btn btn-sm btn-info" onClick={() => location.reload()}>
                                    Sync Data
                                </button>
                            </div>
                        </div>

                        {/* DASHBOARD */}
                        {activeTab === 'Dashboard' && (
                            <div className="row g-4">
                                
                                {/* STATS */}
                                <div className="col-md-3">
                                    <div className="glass-panel p-3 text-center analytics-card">
                                        <div className="stat-label">Total Cohorts</div>
                                        <div className="stat-value">
                                            {stats.totalDrugsAnalyzed || 0}
                                        </div>
                                    </div>
                                </div>

                                <div className="col-md-3">
                                    <div className="glass-panel p-3 text-center analytics-card">
                                        <div className="stat-label">Risk Events</div>
                                        <div className="stat-value text-danger">
                                            {(riskData?.datasets?.[0]?.data?.[0] || 0)}
                                        </div>
                                    </div>
                                </div>

                                <div className="col-md-3">
                                    <div className="glass-panel p-3 text-center analytics-card">
                                        <div className="stat-label">AI Precision</div>
                                        <div className="stat-value text-info">99.1%</div>
                                    </div>
                                </div>

                                <div className="col-md-3">
                                    <div className="glass-panel p-3 text-center analytics-card">
                                        <div className="stat-label">System Load</div>
                                        <div className="stat-value text-success">Low</div>
                                    </div>
                                </div>

                                {/* CHARTS */}
                                <div className="col-lg-8">
                                    <div className="glass-panel p-4 h-100">
                                        <h6 className="mb-4">Anomaly Frequency (by Trial Group)</h6>
                                        <div className="chart-container">
                                            {trendData && (
                                                <VisualChart id="barChart" type="bar" data={trendData} options={{ plugins: { legend: { display: false } } }} />
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="col-lg-4">
                                    <div className="glass-panel p-4 h-100">
                                        <h6 className="mb-4">Global Patient Risk Distribution</h6>
                                        <div className="chart-container">
                                            {riskData && (
                                                <VisualChart id="pieChart" type="pie" data={riskData} options={{ plugins: { legend: { position: 'bottom', labels: {color: '#fff'} } } }} />
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* TABLE (UNCHANGED) */}
                                <div className="col-12 mt-4">
                                    <div className="glass-panel p-4">
                                        <h6 className="mb-3">Recent High-Risk Interaction Log</h6>
                                        <table className="table table-dark table-striped table-custom table-hover m-0">
                                            <thead><tr><th>Patient ID</th><th>Interaction Combo</th><th>Risk Level</th><th>Date Detected</th></tr></thead>
                                            <tbody>
                                                <tr><td>#P-881</td><td>Aspirin + Warfarin</td><td><span className="badge badge-risk-high">High</span></td><td>2026-03-29</td></tr>
                                                <tr><td>#P-902</td><td>Metformin + Contrast</td><td><span className="badge badge-risk-med">Moderate</span></td><td>2026-03-28</td></tr>
                                                <tr><td>#P-114</td><td>Lisinopril + NSAID</td><td><span className="badge badge-risk-med">Moderate</span></td><td>2026-03-28</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* OTHER TABS (UNCHANGED) */}
                        {activeTab !== 'Dashboard' && (
                            <div className="glass-panel p-5 text-center my-5">
                                <h3>{activeTab.toUpperCase()} ENGINE ACTIVE</h3>
                                <p className="text-secondary">Data models loading for deep research analysis.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
