<!doctype html>
<html lang="en" ng-app="dashApp">
  <head>
    <meta charset="UTF-8" />
    <title>MediVise Pro | Dashboard</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #7091ff;
        --accent: #00f2fe;
        --glass: rgba(255, 255, 255, 0.1);
      }
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        color: white;
        background:
          linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)),
          url("../assets/pills.jpg") no-repeat center center fixed;
        background-size: cover;
      }
      .app-wrapper {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 260px;
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(20px);
        padding: 40px 20px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }
      .main-content {
        flex: 1;
        padding: 40px;
      }
      .nav-item {
        padding: 15px 20px;
        border-radius: 12px;
        cursor: pointer;
        margin-bottom: 10px;
        color: rgba(255, 255, 255, 0.6);
        transition: 0.3s;
      }
      .nav-item:hover,
      .nav-item.active {
        background: var(--primary);
        color: white;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }
      .glass-card {
        background: var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 25px;
        backdrop-filter: blur(10px);
      }
      .btn-main {
        background: var(--accent);
        color: #0f172a;
        border: none;
        padding: 15px 30px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
      }
      .btn-main:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
      }
    </style>
  </head>
  <body ng-controller="DashCtrl">
    <div class="app-wrapper">
      <aside class="sidebar">
        <h2 style="margin-bottom: 40px">MediVise <span>Patient</span></h2>
        <div class="nav-item active" onclick="location.href = 'patient.html'">
          DASHBOARD
        </div>
        <div
          class="nav-item"
          onclick="location.href = 'patient_prescription.html'"
        >
        UPLOAD NEW PRESCRIPTION
        </div>
        <div class="nav-item" onclick="location.href = 'patient_alert.html'">
          ALERTS
        </div>
        <div class="nav-item" onclick="location.href = 'patient_history.html'">
          HISTORY
        </div>
        <div class="nav-item" ng-click="logout()">Sign Out</div>
      </aside>

      <main class="main-content">
        <h1>Welcome Back, Patient</h1>

        <div class="stat-grid">
          <div class="glass-card">
            <h3>{{medCount}}</h3>
            <p>Active Medications</p>
          </div>
          <div class="glass-card">
            <h3>{{alertCount}}</h3>
            <p>Pending Alerts</p>
          </div>
          <div class="glass-card">
            <h3 style="color: #fbbf24">Moderate</h3>
            <p>Current Risk Level</p>
          </div>
        </div>

        <div class="glass-card">
          <h4>Quick Actions</h4>
          <button
            class="btn-main"
            onclick="location.href = 'patient_prescription.html'"
          >
            Start New Prescription Analysis
          </button>
        </div>
      </main>
    </div>

    <script>
      angular
        .module("dashApp", [])
        .controller("DashCtrl", function ($scope, $http) {
          $scope.logout = function () {
            fetch("/go/logout", { credentials: "include" }).then(() => {
              console.log("Logged out successfully");
              window.location.href = "/index.html";
              console.log("Redirected to index.html");
            });
          };
          // Get prescriptions (history)
          $http
            .get("http://localhost:5000/go/patient/prescriptions", {
              withCredentials: true,
            })
            .then(function (res) {
              const prescriptions = res.data || [];

              // Total meds count
              $scope.medCount = prescriptions.reduce(
                (acc, p) => acc + (p.drugs?.length || 0),
                0,
              );

              // Alerts = HIGH risk prescriptions
              let alertCount = 0;

              const promises = prescriptions.map((p) =>
                $http.get(`http://localhost:5000/go/patient/analysis/${p.id}`, {
                  withCredentials: true,
                }),
              );

              Promise.all(promises).then((results) => {
                results.forEach((r) => {
                  if (r.data.analysis?.overallRisk === "High") {
                    alertCount++;
                  }
                });
                $scope.alertCount = alertCount;
                $scope.$apply();
              });
            });
        });
    </script>
  </body>
</html>
