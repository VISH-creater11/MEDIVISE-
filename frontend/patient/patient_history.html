<!doctype html>
<html lang="en" ng-app="historyApp">
  <head>
    <meta charset="UTF-8" />
    <title>MediVise Pro | Medical History</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-blue: #7091ff;
        --success-green: #00f2fe;
        --glass-bg: rgba(255, 255, 255, 0.12);
        --card-bg: rgba(255, 255, 255, 0.05);
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        background-image:
          linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)),
          url("frontend/assets/pills.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* --- NAVBAR --- */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 60px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logo {
        font-size: 24px;
        font-weight: 700;
      }
      .logo span {
        color: var(--success-green);
      }

      .nav-btn {
        background: var(--glass-bg);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
      }

      /* --- MAIN CONTAINER --- */
      .container {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .glass-box {
        width: 100%;
        max-width: 1000px;
        background: var(--glass-bg);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 35px;
        padding: 45px;
        backdrop-filter: blur(25px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }

      .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
      }
      .page-title {
        font-size: 32px;
        font-weight: 800;
        margin: 0;
      }

      /* --- SEARCH BAR --- */
      .search-container {
        position: relative;
        width: 300px;
      }
      .search-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 20px;
        border-radius: 12px;
        color: white;
        outline: none;
        transition: 0.3s;
      }
      .search-input:focus {
        border-color: var(--primary-blue);
        background: rgba(255, 255, 255, 0.15);
      }

      /* --- HISTORY TABLE --- */
      .table-container {
        overflow-x: auto;
        margin-top: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      th {
        padding: 15px 20px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #94a3b8;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      td {
        padding: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 15px;
      }

      .status-pill {
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 700;
      }
      .active {
        background: rgba(0, 242, 254, 0.15);
        color: var(--success-green);
      }
      .completed {
        background: rgba(255, 255, 255, 0.1);
        color: #cbd5e1;
      }

      .btn-view {
        background: transparent;
        border: 1px solid var(--primary-blue);
        color: var(--primary-blue);
        padding: 6px 15px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 13px;
      }
      .btn-view:hover {
        background: var(--primary-blue);
        color: white;
      }

      tr:hover td {
        background: rgba(255, 255, 255, 0.03);
      }
    </style>
  </head>
  <body ng-controller="HistoryCtrl">
    <nav class="navbar">
      <div class="logo">MediVise <span>Pro</span></div>
      <div class="nav-right">
        <button class="nav-btn" ng-click="navToDashboard()">
          Back to Dashboard
        </button>
      </div>
    </nav>

    <div class="container">
      <div class="glass-box">
        <div class="header-flex">
          <h2 class="page-title">Medical Archives</h2>
          <div class="search-container">
            <input
              type="text"
              class="search-input"
              placeholder="Search medication..."
              ng-model="searchText"
            />
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Date Issued</th>
                <th>Medication Name</th>
                <th>Dosage</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="item in history | filter:searchText">
                <td style="color: #94a3b8">{{item.date}}</td>
                <td><strong>{{item.name}}</strong></td>
                <td>{{item.dosage}}</td>
                <td>
                  <span
                    class="status-pill"
                    ng-class="item.status.toLowerCase()"
                  >
                    {{item.status}}
                  </span>
                </td>
                <td>
                  <button class="btn-view" ng-click="viewReport(item)">
                    Download Report
                  </button>
                </td>
              </tr>
            </tbody>
          </table>

          <div
            ng-if="(history | filter:searchText).length == 0"
            style="text-align: center; padding: 50px; opacity: 0.5"
          >
            No archived records match your search.
          </div>
        </div>
      </div>
    </div>

    <script>
      angular
        .module("historyApp", [])
        .controller("HistoryCtrl", function ($scope, $http) {
          $scope.navToDashboard = function () {
            window.location.href = "patient.html";
          };

          $scope.history = [];

          $http
            .get("http://localhost:5000/go/patient/prescriptions", {
              withCredentials: true,
            })
            .then(function (res) {
              const prescriptions = res.data || [];

              $scope.history = prescriptions.map((p) => ({
                id: p.id,
                date: p.analysis?.createdAt
                  ? new Date(p.analysis.createdAt).toLocaleDateString()
                  : new Date(p.createdAt).toLocaleDateString(),
                name: p.drugs?.join(", ") || "No drugs",
                dosage: "—",
                status: p.analysis ? "Active" : "Completed",
              }));
            });

          // Download report
          $scope.viewReport = function (item) {
            const url = "http://localhost:5000/go/patient/report/" + item.id;

            const a = document.createElement("a");
            a.href = url;
            a.download = "Medivise_Report.pdf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          };
        });
    </script>
  </body>
</html>
