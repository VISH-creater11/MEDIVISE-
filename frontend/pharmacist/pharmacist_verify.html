<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediVise | Prescription Validation</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #38bdf8; --danger: #ef4444; --success: #10b981;
            --glass: rgba(15, 23, 42, 0.95); --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; color: #f1f5f9;
            background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)),
                        url('../assets/pharmacist-bg.png') no-repeat center center fixed;
            background-size: cover; min-height: 100vh;
        }

        .nav-header {
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .stepper {
            display: flex; justify-content: center; gap: 40px; padding: 20px;
            background: rgba(0,0,0,0.2);
        }
        .step {
            display: flex; align-items: center; gap: 10px; opacity: 0.4;
            transition: 0.3s; cursor: pointer; user-select: none;
        }
        .step.active { opacity: 1; color: var(--accent); font-weight: 700; }
        .step-num {
            width: 24px; height: 24px; border: 2px solid currentColor;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 0.8rem;
        }

        .layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; height: calc(100vh - 130px); }

        .sidebar {
            background: var(--glass); border-radius: 20px; border: 1px solid var(--border);
            backdrop-filter: blur(15px); overflow-y: auto;
        }
        .q-item {
            padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s;
        }
        .q-item:hover { background: rgba(255,255,255,0.03); }
        .q-item.active { background: rgba(56,189,248,0.15); border-left: 4px solid var(--accent); }

        .main-panel {
            background: var(--glass); border-radius: 20px; border: 1px solid var(--border);
            backdrop-filter: blur(15px); overflow-y: auto; padding: 40px;
        }

        .card-inner {
            background: rgba(255,255,255,0.03); padding: 25px; border-radius: 15px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; opacity: 0.5; font-size: 0.8rem; padding-bottom: 15px; }
        td { padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); }

        .edit-input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--accent);
            color: white; padding: 6px 10px; border-radius: 6px; width: 100px;
            font-family: inherit;
        }

        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn {
            padding: 14px 35px; border: none; border-radius: 8px; font-weight: 700;
            cursor: pointer; transition: 0.3s; font-family: inherit;
        }
        .btn-primary  { background: var(--accent); color: #0f172a; }
        .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-success  { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-outline  { background: transparent; border: 1px solid var(--border); color: white; }

        .status-pill { padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
        .warn { background: rgba(239,68,68,0.2); color: var(--danger); }
        .safe { background: rgba(16,185,129,0.2); color: var(--success); }

        .loading { text-align: center; padding: 60px 20px; color: var(--accent); opacity: 0.7; }
        .welcome  { text-align: center; padding: 80px 20px; color: #64748b; }
    </style>
</head>
<body>

    <nav class="nav-header">
        <a href="pharmacist.html" style="color:var(--accent);text-decoration:none;font-size:0.9rem;font-weight:600;">
            ← BACK TO DASHBOARD
        </a>
        <strong style="letter-spacing:1px;">MEDIVISE | WORKFLOW ENGINE</strong>
        <div style="font-size:0.8rem;opacity:0.7;">Pharmacist: <span style="color:var(--accent)">Verified</span></div>
    </nav>

    <!-- Stepper -->
    <div class="stepper">
        <div class="step active" id="step-1-tab" onclick="goToStep(1)">
            <div class="step-num">1</div> Prescription Queue
        </div>
        <div class="step" id="step-2-tab" onclick="goToStep(2)">
            <div class="step-num">2</div> Detail Verification
        </div>
        <div class="step" id="step-3-tab" onclick="goToStep(3)">
            <div class="step-num">3</div> Medication Validation
        </div>
    </div>

    <div class="layout">
        <!-- Sidebar Queue -->
        <div class="sidebar">
            <div style="padding:15px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;">
                Active Prescriptions
            </div>
            <div id="queue-sidebar">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- Main Panel -->
        <div class="main-panel" id="main-panel">
            <div class="welcome">
                <h2>Welcome, Pharmacist</h2>
                <p>Select a prescription from the queue to begin the clinical review.</p>
            </div>
        </div>
    </div>

    <script>
    const API = "http://localhost:5000/pharmacist";
    let currentStep = 1;
    let activeRx    = null;
    let allQueue    = [];

    /* ─── URL param: pre-select a prescription ─── */
    const params = new URLSearchParams(window.location.search);
    const preId  = params.get("id");

    /* ─── Step Navigation ─── */
    function goToStep(n) {
        if (n > 1 && !activeRx) return;
        currentStep = n;
        $(".step").removeClass("active");
        $(`#step-${n}-tab`).addClass("active");
        renderStep();
    }

    /* ─── Render sidebar queue ─── */
    function renderSidebar(data) {
        const $sb = $("#queue-sidebar");
        $sb.empty();
        if (!data.length) {
            $sb.html('<div style="padding:20px;color:#64748b;font-size:13px;">No pending prescriptions.</div>');
            return;
        }
        data.forEach(rx => {
            const drugs = (rx.drugs || []).slice(0, 2).join(', ') + (rx.drugs.length > 2 ? '…' : '');
            const isActive = activeRx && activeRx.id === rx.id;
            const time = new Date(rx.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            $sb.append(`
                <div class="q-item ${isActive ? 'active' : ''}" data-id="${rx.id}">
                    <div style="font-size:0.9rem;font-weight:600;">${drugs || 'Prescription'}</div>
                    <div style="font-size:0.7rem;opacity:0.5;">ID: ${rx.id.slice(-6).toUpperCase()} | ${time}</div>
                </div>`);
        });
        $(".q-item").on("click", function () {
            const id = $(this).data("id");
            loadPrescription(id);
        });
    }

    /* ─── Load a single prescription from backend ─── */
    function loadPrescription(id) {
        $("#main-panel").html('<div class="loading">Loading prescription...</div>');
        $.get(API + "/prescription/" + id)
            .done(function (rx) {
                activeRx = rx;
                renderSidebar(allQueue); // re-render to highlight active
                goToStep(1);
            })
            .fail(() => {
                $("#main-panel").html('<div class="loading" style="color:#ef4444;">Failed to load prescription.</div>');
            });
    }

    /* ─── Render current step ─── */
    function renderStep() {
        const $panel = $("#main-panel");
        $panel.empty();

        if (!activeRx) {
            $panel.html('<div class="welcome"><h2>Welcome, Pharmacist</h2><p>Select a prescription from the queue.</p></div>');
            return;
        }

        if (currentStep === 1) {
            const drugs = (activeRx.drugs || []).join(', ') || 'Unknown';
            const status = activeRx.status || 'Pending';
            $panel.html(`
                <h3>Initial Review</h3>
                <div class="card-inner">
                    <p>Prescription <strong>#${activeRx.id.slice(-6).toUpperCase()}</strong> selected.</p>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:10px;">
                        <div><small style="opacity:0.5;">Drugs</small><br><strong>${drugs}</strong></div>
                        <div><small style="opacity:0.5;">Status</small><br><strong>${status}</strong></div>
                        <div><small style="opacity:0.5;">Submitted</small><br><strong>${new Date(activeRx.createdAt).toLocaleString()}</strong></div>
                        <div><small style="opacity:0.5;">Overall Risk</small><br>
                            <strong style="color:${activeRx.analysis?.overallRisk === 'High' ? '#ef4444' : '#10b981'}">
                                ${activeRx.analysis?.overallRisk || 'Not analyzed'}
                            </strong>
                        </div>
                    </div>
                </div>
                <div style="text-align:right;">
                    <button class="btn btn-primary" onclick="goToStep(2)">Start Verification →</button>
                </div>`);

        } else if (currentStep === 2) {
            const drugs = (activeRx.drugs || []).join(', ');
            $panel.html(`
                <h3 style="margin-top:0;">2. Prescription Details</h3>
                <div class="card-inner">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                        <div><small style="opacity:0.5;">Drugs Prescribed</small><br><strong>${drugs}</strong></div>
                        <div><small style="opacity:0.5;">Prescription ID</small><br><strong>#${activeRx.id.slice(-6).toUpperCase()}</strong></div>
                        <div><small style="opacity:0.5;">Submitted At</small><br><span>${new Date(activeRx.createdAt).toLocaleString()}</span></div>
                        <div><small style="opacity:0.5;">Current Status</small><br><span>${activeRx.status || 'Pending'}</span></div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-outline" onclick="goToStep(1)">Back to Queue</button>
                    <button class="btn btn-primary" onclick="goToStep(3)">Validate Medications →</button>
                </div>`);

        } else if (currentStep === 3) {
            const drugs = activeRx.drugs || [];
            const rows  = drugs.map((drug, i) => {
                const interactions = activeRx.analysis?.interactions || [];
                const hasFlag = interactions.some(
                    inter => inter.analysis?.severity === 'high' &&
                             (inter.drug1.toLowerCase() === drug.toLowerCase() ||
                              inter.drug2.toLowerCase() === drug.toLowerCase())
                );
                return `
                    <tr>
                        <td><strong>${drug}</strong></td>
                        <td><input type="text" class="edit-input drug-dosage" data-index="${i}" value="500mg"></td>
                        <td>—</td>
                        <td>
                            ${hasFlag
                                ? '<span class="status-pill warn">⚠ HIGH RISK</span>'
                                : '<span class="status-pill safe">✓ VALID</span>'}
                        </td>
                    </tr>`;
            }).join('');

            $panel.html(`
                <h3 style="margin-top:0;">3. Medication Dosage Validation</h3>
                <div class="card-inner">
                    <table>
                        <thead>
                            <tr>
                                <th>Drug</th><th>Dosage (Editable)</th><th>Frequency</th><th>Safety Check</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>

                <div style="text-align:center;margin-bottom:15px;">
                    <button class="btn btn-outline" id="btn-run-ml" style="font-size:13px;">
                        ⚙ Run ML Risk Analysis
                    </button>
                </div>

                <div class="btn-group">
                    <button class="btn btn-outline" onclick="goToStep(2)">Back to Verification</button>
                    <button class="btn btn-success" id="btn-finalize">
                        Final Approve & Save →
                    </button>
                </div>`);

            /* Run ML Analysis */
            $("#btn-run-ml").on("click", function () {
                const $btn = $(this);
                $btn.text("Running analysis...").prop("disabled", true);
                $.ajax({
                    url: API + "/analyze/" + activeRx.id,
                    method: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({ age: 40, condition: "general", dosage1: 500, dosage2: 200 }),
                    success: function (result) {
                        activeRx.analysis = { interactions: result.interactions, overallRisk: result.overallRisk };
                        $btn.text("✓ Analysis Complete — Reload step to see risk flags").css("color", "#10b981");
                        setTimeout(() => renderStep(), 1200);
                    },
                    error: function () {
                        $btn.text("ML service unavailable").css("color", "#ef4444").prop("disabled", false);
                    }
                });
            });

            /* Finalize → go to risk analysis page */
            $("#btn-finalize").on("click", function () {
                window.location.href = "pharmacist_risk_analysis.html?id=" + activeRx.id;
            });
        }
    }

    /* ─── Load Queue ─── */
    $(document).ready(function () {
        $.get(API + "/queue")
            .done(function (data) {
                allQueue = data;
                renderSidebar(data);

                // Auto-select if URL has ?id=
                if (preId) {
                    loadPrescription(preId);
                }
            })
            .fail(() => {
                $("#queue-sidebar").html('<div style="padding:20px;color:#ef4444;font-size:13px;">Could not load queue.</div>');
            });
    });
    </script>
</body>
</html>
