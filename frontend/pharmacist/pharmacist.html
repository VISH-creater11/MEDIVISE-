<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediVise | Pharmacist Control Center</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --main-bg: #020617;
            --accent: #38bdf8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)),
                        url('../assets/pharmacist-bg.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
        }

        .sidebar {
            width: 240px; background: var(--sidebar-bg); height: 100vh; position: fixed;
            color: white; padding: 20px; box-sizing: border-box;
            border-right: 1px solid var(--border); z-index: 100;
        }

        .nav-item {
            padding: 12px; margin-bottom: 5px; border-radius: 6px; cursor: pointer;
            transition: 0.2s; font-size: 14px; display: block; text-decoration: none;
            color: var(--text-muted);
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--accent); }
        .nav-item.active { background: #2563eb; color: white; }

        .main-content { margin-left: 240px; padding: 30px; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; background: rgba(15, 23, 42, 0.6);
            padding: 20px; border-radius: 12px; backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border); backdrop-filter: blur(8px);
        }
        .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 26px; font-weight: 700; margin-top: 5px; color: var(--accent); }

        .card {
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border);
            margin-bottom: 25px; overflow: hidden; backdrop-filter: blur(12px);
        }
        .card-header {
            padding: 15px 20px; background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border); font-weight: 700;
            display: flex; justify-content: space-between; font-size: 13px; letter-spacing: 0.5px;
        }

        .list-item {
            padding: 18px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
        }
        .list-item:hover { background: rgba(255,255,255,0.03); }

        .badge { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-danger  { background: rgba(220,38,38,0.2);  color: #f87171; border: 1px solid rgba(220,38,38,0.3); }
        .badge-pending { background: rgba(217,119,6,0.2);  color: #fbbf24; border: 1px solid rgba(217,119,6,0.3); }

        .btn-action {
            background: #2563eb; color: white; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s;
        }
        .btn-action:hover { background: #3b82f6; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        .empty-state { padding: 30px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--main-bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: var(--accent); font-size: 24px; margin-bottom: 35px; letter-spacing: -1px;">MediVise</h2>
        <a href="pharmacist.html"        class="nav-item active">Dashboard Overview</a>
        <a href="pharmacist_verify.html" class="nav-item">Verification Queue</a>
        <a href="pharmacist_alerts.html" class="nav-item">Safety Alerts</a>
        <div style="position: absolute; bottom: 30px; width: 200px; border-top: 1px solid var(--border); padding-top: 20px;">
            <a onclick="logout()" class="nav-item" style="color: #ef4444;">Sign Out</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 style="margin: 0; font-size: 24px;">Pharmacist Dashboard</h1>
            <div id="current-time" style="color: var(--text-muted); font-size: 14px; font-family: monospace;"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Pending Reviews</div>
                <div class="stat-value" id="stat-pending">—</div>
            </div>
            <div class="stat-card" style="border-left: 3px solid #dc2626;">
                <div class="stat-label">Safety Alerts</div>
                <div class="stat-value" id="stat-alerts" style="color: #f87171;">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Verified Today</div>
                <div class="stat-value" id="stat-approved">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">System Status</div>
                <div class="stat-value" style="color: #10b981; font-size: 16px;">PROTECTED</div>
            </div>
        </div>

        <!-- ALERTS SECTION -->
        <div class="card" id="alert-section" style="border: 1px solid rgba(220,38,38,0.3);">
            <div class="card-header" style="color: #f87171;">
                <span>CRITICAL SYSTEM ALERTS</span>
                <span id="alert-pulse" style="font-size: 11px;">● LIVE MONITORING</span>
            </div>
            <div id="alert-list">
                <div class="empty-state">Checking for alerts...</div>
            </div>
        </div>

        <!-- QUEUE SECTION -->
        <div class="card">
            <div class="card-header">PRESCRIPTION VERIFICATION QUEUE</div>
            <div id="queue-list">
                <div class="empty-state">Loading queue...</div>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            fetch("/go/logout", { credentials: "include" })
                .then(() => {
                    window.location.href = "/index.html";
                })
                .catch(() => {
                    alert("Logout failed");
                });
        }
    $(document).ready(function () {

        const API = "http://localhost:5000/pharmacist";


        /* ── Clock ── */
        function updateClock() {
            const now = new Date();
            $('#current-time').text(now.toLocaleTimeString() + " — " + now.toDateString().toUpperCase());
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* ── Alert Pulse ── */
        setInterval(() => $('#alert-pulse').fadeTo(500, 0.2).fadeTo(500, 1.0), 1000);

        /* ── Fetch Stats ── */
        function loadStats() {
            $.get(API + "/stats", function (data) {
                $('#stat-pending').text(data.pending);
                $('#stat-alerts').text(data.alerts);
                $('#stat-approved').text(data.approvedToday);
            }).fail(() => {
                // Graceful fallback if server is down
                $('#stat-pending, #stat-alerts, #stat-approved').text('N/A');
            });
        }

        /* ── Fetch Alerts (High-risk prescriptions) ── */
        function loadAlerts() {
            $.get(API + "/alerts", function (data) {
                const $list = $('#alert-list');
                $list.empty();

                if (!data.length) {
                    $list.html('<div class="empty-state" style="color:#10b981;">✓ No active safety alerts</div>');
                    return;
                }

                data.forEach(rx => {
                    const drugs = rx.drugs.join(' + ') || 'Unknown drugs';
                    $list.append(`
                        <div class="list-item">
                            <div>
                                <strong style="color:#fca5a5;">RX-${rx.id.toString().slice(-4).toUpperCase()}</strong>
                                <span style="color:var(--text-muted); margin:0 10px;">|</span>
                                <span>${drugs}</span>
                                <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">High Risk Interaction Detected</div>
                            </div>
                            <button class="btn-action" style="background:#dc2626;"
                                onclick="location.href='pharmacist_alerts.html?id=${rx.id}'">
                                RESOLVE NOW
                            </button>
                        </div>`);
                });
            }).fail(() => {
                $('#alert-list').html('<div class="empty-state">Could not reach server for alerts.</div>');
            });
        }

        /* ── Fetch Prescription Queue ── */
        function loadQueue() {
            $.get(API + "/queue", function (data) {
                const $list = $('#queue-list');
                $list.empty();

                if (!data.length) {
                    $list.html('<div class="empty-state">No prescriptions pending review.</div>');
                    return;
                }

                // Show latest 5 in dashboard
                data.slice(0, 5).forEach(rx => {
                    const drugs = rx.drugs.slice(0, 2).join(', ') + (rx.drugs.length > 2 ? '...' : '');
                    $list.append(`
                        <div class="list-item">
                            <div>
                                <strong>${drugs || 'Prescription'}</strong>
                                <span style="color:var(--text-muted);font-size:13px;margin-left:10px;">
                                    ID: #${rx.id.toString().slice(-6).toUpperCase()}
                                </span>
                            </div>
                            <div>
                                <span class="badge badge-pending">Waiting</span>
                                <button class="btn-action" style="margin-left:15px;"
                                    onclick="location.href='pharmacist_verify.html?id=${rx.id}'">
                                    VERIFY
                                </button>
                            </div>
                        </div>`);
                });
            }).fail(() => {
                $('#queue-list').html('<div class="empty-state">Could not load queue.</div>');
            });
        }

        /* ── Init ── */
        loadStats();
        loadAlerts();
        loadQueue();

        // Refresh every 30 seconds
        setInterval(() => { loadStats(); loadAlerts(); loadQueue(); }, 30000);
    });
    </script>
</body>
</html>
