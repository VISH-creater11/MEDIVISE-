<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MediVise | Settings</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      :root {
        --sidebar-bg: #0f172a;
        --accent: #38bdf8;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #020617;
        color: #f1f5f9;
        display: flex;
      }
      .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        padding: 25px;
        height: 100vh;
        position: fixed;
      }
      .main-content {
        flex: 1;
        margin-left: 310px;
        padding: 40px;
      }
      .setting-card {
        background: rgba(255, 255, 255, 0.05);
        padding: 30px;
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .row {
        margin-bottom: 20px;
      }
      input {
        width: 100%;
        padding: 10px;
        background: #000;
        border: 1px solid #333;
        color: white;
        margin-top: 10px;
      }
      .save-btn {
        background: var(--accent);
        color: black;
        border: none;
        padding: 15px 30px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <h2 style="color: var(--accent)">MediVise</h2>
      <a
        href="admin.html"
        style="
          color: var(--accent);
          text-decoration: none;
          border: 1px solid var(--accent);
          padding: 10px;
          display: block;
          text-align: center;
        "
        >← Dashboard</a
      >
    </aside>
    <main class="main-content">
      <h1>Global Configuration</h1>
      <div class="setting-card">
        <div class="row">
          <label>System Primary API Key</label>
          <input type="password" value="************************" />
        </div>
        <div class="row">
          <label>Auto-Backup Interval (Minutes)</label>
          <input type="number" value="60" />
        </div>
        <button class="save-btn" onclick="alert('Configuration Saved!')">
          Update System
        </button>
      </div>
    </main>
    <script>
      $(".save-btn").click(function () {
        const apiKey = $('input[type="password"]').val();
        const interval = $('input[type="number"]').val();

        $.ajax({
          url: "http://localhost:5000/go/admin/settings",
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify({
            apiKey,
            backupInterval: interval,
          }),
          success: function () {
            alert("Settings saved to backend");
          },
        });
      });
    </script>
  </body>
</html>
