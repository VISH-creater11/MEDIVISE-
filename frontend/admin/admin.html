<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MediVise | Admin Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sidebar-bg: #0f172a;
        --accent: #38bdf8;
        --card-bg: rgba(15, 23, 42, 0.85);
        --border: rgba(255, 255, 255, 0.1);
        --text-muted: #94a3b8;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background:
          linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)),
          url("../assets/research-bg.png") no-repeat center center fixed;
        background-size: cover;
        color: #f1f5f9;
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        padding: 25px;
        border-right: 1px solid var(--border);
        backdrop-filter: blur(10px);
        position: fixed;
        height: 100vh;
      }
      .sidebar h2 {
        color: var(--accent);
        margin-bottom: 30px;
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .nav-item {
        padding: 12px 15px;
        margin-bottom: 8px;
        border-radius: 8px;
        display: block;
        text-decoration: none;
        color: var(--text-muted);
        transition: 0.3s;
        font-size: 14px;
        border: 1px solid transparent;
      }
      .nav-item:hover {
        background: rgba(56, 189, 248, 0.1);
        color: var(--accent);
        border-color: rgba(56, 189, 248, 0.2);
      }
      .nav-item.active {
        background: #2563eb;
        color: white;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
      }
      .main-content {
        flex: 1;
        margin-left: 310px;
        padding: 40px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-top: 30px;
      }
      .stat-card {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        border: 1px solid var(--border);
        text-align: center;
        backdrop-filter: blur(10px);
      }
      .stat-card h2 {
        font-size: 42px;
        color: var(--accent);
        margin: 10px 0;
      }
      .loading {
        color: var(--text-muted);
        font-size: 18px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .error-msg {
        color: #ef4444;
        font-size: 13px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <h2>MediVise</h2>
      <nav>
        <a href="admin.html" class="nav-item active">Dashboard</a>
        <a href="admin_users.html" class="nav-item">User Management</a>
        <a href="admin_roles.html" class="nav-item">Role Management</a>
        <a href="admin_drugs.html" class="nav-item">Drug Database</a>
        <a href="admin_logs.html" class="nav-item">System Logs</a>
        <a href="admin_reports.html" class="nav-item">Reports</a>
        <a href="admin_alerts.html" class="nav-item">Security Alerts</a>
        <a
          onclick="logout()"
          class="nav-item"
          style="
            color: #ef4444;
            border-top: 1px solid var(--border);
            margin-top: 20px;
            padding-top: 20px;
          "
          >Logout</a
        >
      </nav>
    </aside>
    <main class="main-content">
      <h1>Admin Control Hub</h1>
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Users</h3>
          <h2 id="totalUsers" class="loading">...</h2>
        </div>
        <div class="stat-card">
          <h3>Total Prescriptions</h3>
          <h2 id="totalPrescriptions" class="loading">...</h2>
        </div>
        <div class="stat-card">
          <h3>Drugs In Registry</h3>
          <h2 id="totalDrugs" class="loading">...</h2>
        </div>
      </div>
      <p id="dashError" class="error-msg"></p>
    </main>

    <script>
      const BASE = "http://localhost:5000/go";
      function logout() {
        fetch("/go/logout", { credentials: "include" })
          .then(() => {
            window.location.href = "/index.html";
          })
          .catch(() => {
            alert("Logout failed");
          });
      }

      // Fetch /admin/reports for totalUsers + totalPrescriptions
      $.ajax({
        url: BASE + "/admin/reports",
        method: "GET",
        xhrFields: { withCredentials: true },
        success: function (data) {
          $("#totalUsers")
            .text(data.totalUsers.toLocaleString())
            .removeClass("loading");
          $("#totalPrescriptions")
            .text(data.totalPrescriptions.toLocaleString())
            .removeClass("loading");
        },
        error: function () {
          $("#totalUsers").text("—").removeClass("loading");
          $("#totalPrescriptions").text("—").removeClass("loading");
          $("#dashError").text(
            "Could not load report stats. Check session/auth.",
          );
        },
      });

      // Fetch /admin/drugs for drug count
      $.ajax({
        url: BASE + "/admin/drugs",
        method: "GET",
        xhrFields: { withCredentials: true },
        success: function (data) {
          $("#totalDrugs")
            .text(data.length.toLocaleString())
            .removeClass("loading");
        },
        error: function () {
          $("#totalDrugs").text("—").removeClass("loading");
        },
      });
    </script>
  </body>
</html>
